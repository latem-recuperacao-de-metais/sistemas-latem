<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesagem de Matéria Prima</title>
    <link rel="icon" type="image/png" href="../photos/logo-latem.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+128&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .scale-section { display:flex; flex-direction:column; gap:15px; overflow-y:hidden; } 
        .display-container { background:var(--display-bg); color:var(--display-text); padding:20px 30px; border-radius:16px; text-align:right; position:relative; box-shadow:inset 0 0 30px rgba(0,0,0,0.6); display:flex; flex-direction:column; justify-content:center; height:150px; flex-shrink:0; } 
        .display-label { position:absolute; top:20px; left:20px; font-size:0.9rem; color:#64748b; font-weight:600; text-transform:uppercase; } 
        .weight-value { font-family:'Courier New', monospace; font-size:4.5rem; font-weight:700; text-shadow:0 0 15px rgba(56,189,248,0.4); } 
        .display-offline .weight-value { color:#334155; text-shadow:none; } 
        .unit { font-size:1.5rem; color:#64748b; position:absolute; bottom:25px; right:30px; }
        .weight-controls { display:grid; grid-template-columns:1fr 1fr 1fr; gap:15px; margin-top:5px; flex-shrink:0; } 
        .weight-input-card { background:#f8fafc; padding:12px 15px; border-radius:12px; border:1px solid #e2e8f0; display:flex; flex-direction:column; justify-content:center; } 
        .weight-input-card label { margin-bottom:5px; } 
        .weight-input-card input { font-size:1.4rem; font-weight:700; border:none; background:transparent!important; border-bottom:2px solid #cbd5e1; width:100%; text-align:right; padding:5px 0; border-radius:0; } 
        .weight-input-card input[readonly] { color:var(--secondary); cursor:not-allowed; border-bottom-style:dashed; } 
        .highlight { background:#ecfdf5; border-color:#a7f3d0; } 
        .highlight input { color:var(--success); border-color:var(--success); }
        .actions { display:flex; gap:15px; flex-shrink:0; } 
        .history-section { flex:1; display:flex; flex-direction:column; overflow:hidden; margin-top:10px; background:white; border-radius:12px; padding:15px; border:1px solid #e2e8f0; } 
        .table-container { overflow-y:auto; flex:1; } 
        table { width:100%; border-collapse:collapse; font-size:0.85rem; } 
        th { text-align:left; padding:12px; background:#f8fafc; color:var(--secondary); font-weight:700; position:sticky; top:0; z-index:5; } 
        td { padding:10px 12px; border-bottom:1px solid #e2e8f0; vertical-align:middle; }
        .etiqueta-modal { background:white; width: 380px; display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:2000; flex-direction:column; box-shadow:0 0 50px rgba(0,0,0,0.5); font-family:'Courier New', monospace; border-radius:8px; overflow:hidden; }
        .etiqueta-content { padding:15px; display:flex; flex-direction:column; background: white; }
        @media print {
            body.printing-label { margin: 0 !important; padding: 0 !important; background: white !important; }
            .printing-label @page { size: 100mm 70mm !important; margin: 0 !important; }
            .printing-label * { visibility: hidden; }
            .printing-label #etiquetaModal, .printing-label #etiquetaModal * { visibility: visible; }
            .printing-label #etiquetaModal { position: absolute !important; left: 0 !important; top: 0 !important; width: 100mm !important; height: 70mm !important; margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; transform: none !important; border-radius: 0 !important; display: block !important; background: white !important; }
            .printing-label #etiquetaArea { width: 100mm !important; height: 70mm !important; padding: 4mm !important; box-sizing: border-box !important; display: flex !important; flex-direction: column !important; justify-content: space-between !important; }
            .printing-label .btn-print-area { display: none !important; }
            header, .sidebar, .actions, .form-section, .weight-controls { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="confirmModal" class="modal-overlay hidden" style="z-index:99999">
        <div style="background:white;padding:30px;border-radius:16px;text-align:center;max-width:350px">
            <i class="fa-solid fa-circle-question" style="font-size:3rem;color:var(--warning);margin-bottom:15px"></i>
            <h3 style="margin-bottom:10px;color:var(--text-main)">Confirmar Exclusão</h3>
            <p style="color:var(--secondary);margin-bottom:20px">Deseja realmente excluir este registo?</p>
            <div style="display:flex;gap:10px;justify-content:center">
                <button class="btn btn-secondary" onclick="fecharConfirmacao()">Cancelar</button>
                <button class="btn btn-danger" onclick="confirmarExclusao()">Excluir</button>
            </div>
        </div>
    </div>
    
    <div id="etiquetaModal" class="etiqueta-modal">
        <div id="etiquetaArea" class="etiqueta-content" style="height:265px;"></div>
        <div class="btn-print-area" style="padding:10px;border-top:1px solid #eee;background:#f8fafc;display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="imprimirEtiqueta()" style="flex:1"><i class="fa-solid fa-print"></i> Imprimir</button>
            <button class="btn btn-secondary" onclick="fecharEtiqueta()" style="flex:1">Fechar</button>
        </div>
    </div>
    
    <nav class="sidebar">
        <div class="logo-area"><img src="../photos/logo-latem.png" alt="Logo" onerror="this.style.display='none'"></div>
        <a href="#" class="nav-item active"><div class="nav-icon"><i class="fa-solid fa-scale-balanced"></i></div><span class="nav-text">Pesagem</span></a>
        <div style="margin-top:auto;width:100%;margin-bottom:20px">
            <a href="#" class="nav-item" onclick="logout(); return false;">
                <div class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></div><span class="nav-text">Sair</span>
            </a>
        </div>
    </nav>

    <main class="main-content">
        <header>
            <div class="header-left">
                <div id="scaleStatus" class="status-badge" style="display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:20px;font-size:0.85rem;font-weight:600;background:#fee2e2;color:var(--danger);cursor:pointer;" onclick="conectarBalanca()">
                    <div class="status-dot" style="width:8px;height:8px;border-radius:50%;background:currentColor;"></div>
                    <span id="statusText">Desconectada (Clique conectar)</span>
                </div>
            </div>
            <div class="header-center">
                <i class="fa-regular fa-clock" style="color:var(--primary)"></i>
                <div class="clock-display" id="clock">00:00:00</div>
                <div style="font-size:0.9rem;color:var(--secondary);font-weight:600;" id="date">01/01/2024</div>
            </div>
            <div class="user-info">
                <span id="userNameDisplay">---</span>
                <div class="user-avatar" id="userAvatarIcon"><i class="fa-solid fa-user"></i></div>
            </div>
        </header>
        
        <div class="card form-section">
            <div class="card-title"><span><i class="fa-solid fa-file-invoice"></i> Dados da Matéria Prima</span></div>
            <div class="input-group"><label>Nº do Ticket</label><input type="text" id="ticket" placeholder="Insira o Ticket da Balança"></div>
            <div class="input-group"><label>Nota Fiscal</label><input type="text" id="nfe" placeholder="000.000.000"></div>
            <div class="input-group"><label>Fornecedor</label><input type="text" id="fornecedor" placeholder="Selecione o Fornecedor"></div>
            <div class="input-group"><label>Material</label><input type="text" id="material" placeholder="Selecione o Material"></div>
            <div class="input-group"><label>Localização</label><input type="text" id="localizacao" placeholder="Selecione a Localização"></div>
            <div class="input-group"><label>Unidade</label><input type="text" id="unidade" placeholder="Selecione a Unidade"></div>
            <div style="margin-top:auto;padding-top:10px;text-align:center;">
                <button class="btn btn-secondary" onclick="limparTudo()" style="width:100%;">
                    <i class="fa-solid fa-eraser"></i> Limpar Tudo
                </button>
            </div>
        </div>

        <div class="scale-section">
            <div id="displayContainer" class="display-container display-offline">
                <div class="display-label">PESO LÍQUIDO (kg)</div>
                <div class="weight-value" id="displayLiquido">----</div>
                <div class="unit">KG</div>
            </div>
            <div class="weight-controls">
                <div class="weight-input-card">
                    <label>Peso Bruto (kg)</label>
                    <input type="number" id="pesoBruto" value="0" readonly oninput="calcularPesos()">
                </div>
                <div class="weight-input-card" style="border-left:4px solid var(--primary);">
                    <label>Tara (kg)</label>
                    <input type="number" id="pesoTara" placeholder="0" oninput="calcularPesos()">
                </div>
                <div class="weight-input-card highlight">
                    <label>Peso Líquido (kg)</label>
                    <input type="number" id="pesoLiquido" value="0" readonly>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" onclick="realizarPesagem()"><i class="fa-solid fa-scale-balanced"></i> Pesar</button>
                <button class="btn btn-warning" onclick="gerarRelatorio()"><i class="fa-solid fa-print"></i> Relatório</button>
            </div>
            <div class="history-section">
                <div class="card-title" style="margin-bottom:10px; display:flex; justify-content:space-between;">
                    <span><i class="fa-solid fa-list-check"></i> Registros</span>
                </div>
                <div class="table-container">
                    <table id="historyTable">
                        <thead><tr><th>Material</th><th>Localização</th><th>Unidade</th><th style="text-align:right">Peso Líquido</th><th style="text-align:right">Tara</th><th style="text-align:right">Peso Bruto</th><th style="text-align:center">Ações</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/app.js"></script>

    <script>
        function saveFormState() {
            const state = {
                ticket: document.getElementById('ticket').value,
                nfe: document.getElementById('nfe').value,
                fornecedor: document.getElementById('fornecedor').value,
                material: document.getElementById('material').value,
                localizacao: document.getElementById('localizacao').value,
                unidade: document.getElementById('unidade').value,
                pesoTara: document.getElementById('pesoTara').value
            };
            localStorage.setItem('latem_pesagem_mp_state', JSON.stringify(state));
        }

        function loadFormState() {
            const state = JSON.parse(localStorage.getItem('latem_pesagem_mp_state'));
            if(state) {
                ['ticket', 'nfe', 'fornecedor', 'material', 'localizacao', 'unidade', 'pesoTara'].forEach(id => {
                    if(document.getElementById(id)) document.getElementById(id).value = state[id] || '';
                });
                calcularPesos();
            }
        }

        document.querySelector('.form-section').addEventListener('input', saveFormState);
        document.querySelector('.weight-controls').addEventListener('input', saveFormState);

        let scaleConnected = false, serialPort = null, serialReader = null, keepReading = false;
        
        window.addEventListener('beforeunload', async() => {
            if(scaleConnected) {
                keepReading = false;
                if(serialReader) await serialReader.cancel().catch(e=>console.log(e));
                if(serialPort) await serialPort.close().catch(e=>console.log(e));
                localStorage.removeItem('latem_scale_connected');
            }
        });

        async function conectarBalanca() {
            if(scaleConnected) {
                keepReading=false; if(serialReader) await serialReader.cancel().catch(e=>console.log(e)); if(serialPort) await serialPort.close().catch(e=>console.log(e));
                scaleConnected=false; localStorage.removeItem('latem_scale_connected'); updateStatus(false); showToast('Balança desconectada.','info'); return;
            }
            if(!('serial' in navigator)) return showToast('O seu navegador não suporta conexão com a balança.','error');
            try {
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({baudRate:9600});
                scaleConnected=true; keepReading=true; localStorage.setItem('latem_scale_connected','true');
                updateStatus(true); showToast('Balança conectada com sucesso!', 'success');
                readSerialLoop();
            } catch(err) {
                showToast('Falha ao conectar. Confirme a porta.','error'); scaleConnected=false; updateStatus(false);
            }
        }

        function updateStatus(c) { 
            const b = document.getElementById('scaleStatus'), t = document.getElementById('statusText'), d = document.getElementById('displayContainer'), i = document.getElementById('pesoBruto'); 
            if(c) {
                b.style.background = '#dcfce7'; b.style.color = 'var(--success)'; t.innerText = "Conectada"; d.classList.remove('display-offline'); i.readOnly = true;
            } else {
                b.style.background = '#fee2e2'; b.style.color = 'var(--danger)'; t.innerText = "Desconectada (Clique conectar)"; d.classList.add('display-offline'); document.getElementById('displayLiquido').innerText = "----"; i.value = 0; i.readOnly = false;
            } 
        }

        async function readSerialLoop() { 
            const td = new TextDecoderStream(); serialPort.readable.pipeTo(td.writable); const r = td.readable.getReader(); serialReader = r; let buf = ''; 
            try {
                while(keepReading) {
                    const {value, done} = await r.read(); if(done) break;
                    if(value) {
                        buf += value;
                        if(buf.includes('\r') || buf.includes('\n')) {
                            const lines = buf.split(/[\r\n]+/); const lastData = lines.filter(x => x.trim().length > 0).pop();
                            if(lastData) {
                                const match = lastData.match(/(\d+(\.\d+)?)/);
                                if(match && match[0]) {
                                    document.getElementById('pesoBruto').value = parseFloat(match[0]);
                                    calcularPesos();
                                }
                            }
                            buf = '';
                        }
                    }
                }
            } catch(e) { 
                showToast('Erro de hardware. Balança desconectada.', 'error');
                updateStatus(false);
                scaleConnected = false;
            } finally { r.releaseLock(); } 
        }

        async function autoConnectScale() {
            if(!('serial' in navigator)) return;
            try {
                const p = await navigator.serial.getPorts();
                if(p.length > 0) {
                    serialPort = p[0]; await serialPort.open({baudRate:9600}); scaleConnected=true; keepReading=true; updateStatus(true); showToast('Balança auto-conectada!', 'success'); readSerialLoop();
                } else if(localStorage.getItem('latem_scale_connected') === 'true') {
                    conectarBalanca();
                }
            } catch(e){}
        }

        let currentUser = 'Operador';
        function carregarOperador() { 
            currentUser = localStorage.getItem('latem_user') || 'Operador'; 
            document.getElementById('userNameDisplay').innerText = currentUser; 
            document.getElementById('userAvatarIcon').innerText = currentUser.charAt(0).toUpperCase(); 
        }
        
        function logout() { 
            showToast("Voltando ao menu principal...","info"); 
            if(scaleConnected) { try{keepReading=false;if(serialReader)serialReader.cancel().catch(e=>console.log(e));if(serialPort)serialPort.close().catch(e=>console.log(e));localStorage.removeItem('latem_scale_connected');}catch(e){} } 
            setTimeout(() => { window.location.href = '../index.html' }, 1000);
        }

        function calcularPesos() {
            const b = parseFloat(document.getElementById('pesoBruto').value) || 0;
            const t = parseFloat(document.getElementById('pesoTara').value) || 0;
            const l = b - t;
            document.getElementById('pesoLiquido').value = l;
            const d = document.getElementById('displayLiquido');
            d.innerText = l;
            d.style.color = l < 0 ? 'var(--danger)' : '';
        }

        function getDb() { return JSON.parse(localStorage.getItem('latem_db_v2')) || []; } 
        function saveDb(d) { localStorage.setItem('latem_db_v2', JSON.stringify(d)); renderHistory(); }
        function lockFields() { ['ticket','nfe','fornecedor'].forEach(id => document.getElementById(id).readOnly = true); } 
        function unlockFields() { ['ticket','nfe','fornecedor'].forEach(id => document.getElementById(id).readOnly = false); }

        function realizarPesagem() {
            const t = document.getElementById('ticket').value, m = document.getElementById('material').value, f = document.getElementById('fornecedor').value, loc = document.getElementById('localizacao').value, un = document.getElementById('unidade').value, b = parseFloat(document.getElementById('pesoBruto').value) || 0, ta = document.getElementById('pesoTara').value || 0, l = document.getElementById('pesoLiquido').value;
            if(!t || !f || !m || !loc || !un) return showToast("Preencha todos os campos obrigatórios.", 'warning'); 
            if(b <= 0) return showToast("Peso inválido.", 'warning');
            
            const r = {
                id: Date.now(), data: new Date().toLocaleDateString('pt-BR'), hora: new Date().toLocaleTimeString('pt-BR'),
                ticket: t, nfe: document.getElementById('nfe').value, fornecedor: f, local: loc,
                material: m, unidade: un, bruto: b, tara: ta, liquido: l, responsavel: currentUser
            };
            
            const db = getDb(); db.unshift(r); saveDb(db); lockFields(); showToast("Pesagem registrada com sucesso!", "success");
            
            document.getElementById('etiquetaArea').innerHTML = `
                <div style="height:100%; display:flex; flex-direction:column; justify-content:space-between; box-sizing:border-box;">
                    <div style="text-align:center;border-bottom:2px solid black;padding-bottom:2mm;margin-bottom:2mm">
                        <img src="../photos/logo-latem.png" style="max-height:10mm;margin-bottom:1mm" onerror="this.style.display='none'">
                        <div style="font-size:12px;font-weight:bold;letter-spacing:1px">COMPROVANTE DE PESAGEM</div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:11px;line-height:1.6;margin-bottom:5px;">
                        <div style="text-align:left">
                            <div><strong>Ticket:</strong> ${r.ticket}</div>
                            <div style="margin-top:2px"><strong>Nota Fiscal:</strong> ${r.nfe || '---'}</div>
                        </div>
                        <div style="text-align:right">
                            <div><strong>Fornecedor:</strong> ${r.fornecedor}</div>
                            <div style="margin-top:2px"><strong>Material:</strong> ${r.material}</div>
                        </div>
                    </div>
                    <div style="text-align:center;border-top:1px dashed black;border-bottom:1px dashed black;padding:5px 0;margin:5px 0;font-size:11px">
                        <div style="display:flex;justify-content:space-between">
                            <span>Peso Bruto: ${r.bruto} kg</span>
                            <span>Tara: ${r.tara} kg</span>
                        </div>
                        <div style="font-size:18px;font-weight:bold;margin-top:2px">Peso Líquido: ${r.liquido} kg</div>
                    </div>
                    <div style="margin-top:auto;text-align:center">
                        <div style="font-family:'Libre Barcode 128',cursive;font-size:36px">*${r.ticket}*</div>
                    </div>
                    <div style="margin-top:5px;border-top:1px solid black;padding-top:3px;text-align:center;font-size:9px;font-weight:bold;">
                        DATA: ${r.data} | HORA: ${r.hora} | RESPONSÁVEL: ${r.responsavel.toUpperCase()}
                    </div>
                </div>`;
            document.getElementById('etiquetaModal').style.display = 'flex';
            
            ['localizacao','material','unidade'].forEach(id => document.getElementById(id).value = ''); 
            if(!scaleConnected) document.getElementById('pesoBruto').value = ''; 
            document.getElementById('pesoTara').value = ''; 
            calcularPesos();
            saveFormState();
        }

        function limparTudo() {
            const a = getDb().length > 0, b = document.getElementById('pesoBruto').value, l = document.getElementById('localizacao').value, m = document.getElementById('material').value, u = document.getElementById('unidade').value, t = document.getElementById('pesoTara').value;
            if(a) {
                if(!l && !m && !u && !t && !b) return showToast("Os campos parciais já estão vazios.",'warning');
                ['localizacao','material','unidade','pesoTara'].forEach(id => document.getElementById(id).value = ''); 
                if(!scaleConnected) document.getElementById('pesoBruto').value = '';
                calcularPesos(); showToast("Campos parciais limpos.",'success');
            } else {
                const ti = document.getElementById('ticket').value, n = document.getElementById('nfe').value, f = document.getElementById('fornecedor').value;
                if(!ti && !n && !f && !l && !m && !u && !t && !b) return showToast("O formulário já está vazio.",'warning');
                ['ticket','nfe','fornecedor','localizacao','material','unidade','pesoTara'].forEach(id => document.getElementById(id).value = '');
                if(!scaleConnected) document.getElementById('pesoBruto').value = ''; 
                unlockFields(); calcularPesos(); showToast("Tudo limpo.",'success');
            }
            saveFormState();
        }
        
        let itemParaRemover = null; 
        function pedirRemocao(id) { itemParaRemover = id; document.getElementById('confirmModal').classList.remove('hidden'); } 
        function fecharConfirmacao() { itemParaRemover = null; document.getElementById('confirmModal').classList.add('hidden'); } 
        function confirmarExclusao() { 
            if(itemParaRemover !== null) { 
                let d = getDb().filter(i => i.id !== itemParaRemover); saveDb(d); 
                if(d.length === 0) unlockFields(); 
                showToast("Registo removido.","info"); itemParaRemover = null;
            } 
            document.getElementById('confirmModal').classList.add('hidden'); 
        }

        function renderHistory() {
            const b = document.querySelector('#historyTable tbody'); b.innerHTML = '';
            getDb().forEach(i => {
                b.innerHTML += `<tr><td>${i.material}</td><td>${i.local||'-'}</td><td>${i.unidade||'-'}</td><td style="text-align:right;color:var(--primary);font-weight:bold">${i.liquido} kg</td><td style="text-align:right">${i.tara} kg</td><td style="text-align:right">${i.bruto} kg</td><td style="text-align:center"><button class="btn-danger" style="padding:5px 8px" onclick="pedirRemocao(${i.id})"><i class="fa-solid fa-trash"></i></button></td></tr>`
            });
        }
        
        function fecharEtiqueta() { document.getElementById('etiquetaModal').style.display = 'none'; } 
        function imprimirEtiqueta() { document.body.classList.add('printing-label'); window.print(); document.body.classList.remove('printing-label'); }
        
        function gerarRelatorio(){ 
            const db=getDb();if(!db.length)return showToast("Sem registos.",'warning'); 
            let tb=0,tt=0,tl=0,rw=''; 
            db.slice().reverse().forEach(i=>{
                tb+=parseFloat(i.bruto||0);tt+=parseFloat(i.tara||0);tl+=parseFloat(i.liquido||0);
                rw+=`<tr><td>${i.material}</td><td>${i.local||'-'}</td><td style="text-align:center">${i.unidade||'-'}</td><td style="text-align:right">${i.bruto}</td><td style="text-align:right">${i.tara}</td><td style="text-align:right;font-weight:bold">${i.liquido}</td></tr>`
            }); 
            const horaStr = new Date().toLocaleTimeString('pt-BR').replace(/:/g, '-');
            const filename = `RPMP_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}_${horaStr}_${db[0].ticket}_${db[0].fornecedor}_${tl.toFixed(2)}kg`;
            const conteudoHTML = `
                <div style="display: flex; justify-content: space-between; border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; background: #f9f9f9; font-size:14px;">
                    <div style="text-align: left;">
                        <div><strong>Ticket:</strong> ${db[0].ticket}</div>
                        <div style="margin-top:4px"><strong>Nota Fiscal:</strong> ${db[0].nfe || '---'}</div>
                        <div style="margin-top:4px"><strong>Fornecedor:</strong> ${db[0].fornecedor}</div>
                    </div>
                </div>
                <div style="display: flex; justify-content: space-around; border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; background: #f9f9f9; font-size:15px; font-weight: bold;">
                    <span>Peso Bruto Total: ${tb.toFixed(2)} kg</span>
                    <span>Tara Total: ${tt.toFixed(2)} kg</span>
                    <span>Peso Líquido Total: ${tl.toFixed(2)} kg</span>
                </div>
                <table>
                    <thead><tr><th>Material</th><th>Localização</th><th style="text-align:center">Unidade</th><th style="text-align:right">Peso Bruto (kg)</th><th style="text-align:right">Tara (kg)</th><th style="text-align:right">Peso Líquido (kg)</th></tr></thead>
                    <tbody>${rw}</tbody>
                </table>
            `; 
            baixarArquivoRelatorio("Relatório de Pesagem de Matéria Prima", conteudoHTML, filename, currentUser);
            localStorage.removeItem('latem_db_v2');
            renderHistory();
            unlockFields();
            limparTudo();
        }
        
        window.onload = () => {
            carregarOperador(); 
            setupAutocomplete('fornecedor', CONFIG.fornecedores);
            setupAutocomplete('material', CONFIG.materiais);
            setupAutocomplete('localizacao', CONFIG.locais);
            setupAutocomplete('unidade', CONFIG.unidades);
            loadFormState();
            renderHistory();
            const d = getDb();
            if(d.length > 0) {
                lockFields();
                document.getElementById('ticket').value = d[0].ticket;
                document.getElementById('nfe').value = d[0].nfe || '';
                document.getElementById('fornecedor').value = d[0].fornecedor;
                showToast("Atenção: Pesagem em andamento.", "info");
            } 
            autoConnectScale();
        }
    </script>
</body>
</html>
