<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação de Tarugos e Lingotes</title>
    <link rel="icon" type="image/png" href="../photos/logo-latem.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+128&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .scale-section { display:flex; flex-direction:column; gap:15px; overflow-y:hidden; } 
        .display-container { background:var(--display-bg); color:var(--display-text); padding:20px 30px; border-radius:16px; text-align:right; position:relative; box-shadow:inset 0 0 30px rgba(0,0,0,0.6); display:flex; flex-direction:column; justify-content:center; height:150px; flex-shrink:0; } 
        .display-label { position:absolute; top:20px; left:20px; font-size:0.9rem; color:#64748b; font-weight:600; text-transform:uppercase; } 
        .weight-value { font-family:'Courier New', monospace; font-size:4.5rem; font-weight:700; text-shadow:0 0 15px rgba(56,189,248,0.4); } 
        .unit { font-size:1.5rem; color:#64748b; position:absolute; bottom:25px; right:30px; }
        .weight-controls { display:grid; grid-template-columns:0.8fr 1fr 1fr 1fr; gap:20px; margin-top:5px; flex-shrink:0; } 
        .weight-input-card { background:#f8fafc; padding:12px 15px; border-radius:12px; border:1px solid #e2e8f0; display:flex; flex-direction:column; justify-content:center; } 
        .weight-input-card label { margin-bottom:5px; } 
        .weight-input-card input { font-size:1.4rem; font-weight:700; border:none; background:transparent!important; border-bottom:2px solid #cbd5e1; width:100%; text-align:right; padding:5px 0; border-radius:0; } 
        .weight-input-card input[readonly] { color:var(--secondary); cursor:not-allowed; border-bottom-style:dashed; } 
        .highlight { background:#ecfdf5; border-color:#a7f3d0; } 
        .highlight input { color:var(--success); border-color:var(--success); } 
        .qtd-card { background:#fff7ed; border-color:#fed7aa; } 
        .qtd-card input { color:#c2410c; border-color:#f97316; text-align:center; }
        .actions { display:flex; gap:15px; flex-shrink:0; } 
        .history-section { flex:1; display:flex; flex-direction:column; overflow:hidden; margin-top:10px; background:white; border-radius:12px; padding:15px; border:1px solid #e2e8f0; } 
        .table-container { overflow-y:auto; flex:1; } 
        table { width:100%; border-collapse:collapse; font-size:0.85rem; } 
        th { text-align:left; padding:12px; background:#f8fafc; color:var(--secondary); font-weight:700; position:sticky; top:0; z-index:5; } 
        td { padding:10px 12px; border-bottom:1px solid #e2e8f0; vertical-align:middle; }
        .etiqueta-modal { background:white; width: 380px; display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:2000; flex-direction:column; box-shadow:0 0 50px rgba(0,0,0,0.5); font-family:'Courier New', monospace; border-radius:8px; overflow:hidden; }
        .etiqueta-content { padding:15px; display:flex; flex-direction:column; background: white; }
        @media print { 
            body.printing-label { margin: 0 !important; padding: 0 !important; background: white !important; }
            .printing-label @page { size: 100mm 70mm !important; margin: 0 !important; }
            .printing-label * { visibility: hidden; } 
            .printing-label #etiquetaModal, .printing-label #etiquetaModal * { visibility: visible; } 
            .printing-label #etiquetaModal { position: absolute !important; left: 0 !important; top: 0 !important; width: 100mm !important; height: 70mm !important; display: flex !important; flex-direction: column !important; justify-content: center !important; border: none !important; box-shadow: none !important; transform: none !important; margin: 0 !important; box-sizing: border-box !important; border-radius: 0 !important; } 
            .printing-label #etiquetaArea { padding: 3mm !important; width: 100mm !important; height: 70mm !important; display: flex !important; flex-direction: column !important; justify-content: space-between !important; box-sizing: border-box !important; }
            .printing-label .btn-print-area { display: none !important; } 
            header, .sidebar, .actions, .form-section, .weight-controls { display: none !important; } 
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="confirmModal" class="modal-overlay hidden" style="z-index:99999">
        <div style="background:white;padding:30px;border-radius:16px;text-align:center;max-width:350px">
            <i class="fa-solid fa-circle-question" style="font-size:3rem;color:var(--warning);margin-bottom:15px"></i>
            <h3 style="margin-bottom:10px;color:var(--text-main)">Confirmar Exclusão</h3>
            <p style="color:var(--secondary);margin-bottom:20px">Deseja realmente excluir este registo?</p>
            <div style="display:flex;gap:10px;justify-content:center">
                <button class="btn btn-secondary" onclick="fecharConfirmacao()">Cancelar</button>
                <button class="btn btn-danger" onclick="confirmarExclusao()">Excluir</button>
            </div>
        </div>
    </div>
    
    <div id="etiquetaModal" class="etiqueta-modal">
        <div id="etiquetaArea" class="etiqueta-content" style="height:265px;"></div>
        <div class="btn-print-area" style="padding:10px;border-top:1px solid #eee;background:#f8fafc;display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="imprimirEtiqueta()" style="flex:1"><i class="fa-solid fa-print"></i> Imprimir</button>
            <button class="btn btn-secondary" onclick="fecharEtiqueta()" style="flex:1">Fechar</button>
        </div>
    </div>
    
    <nav class="sidebar">
        <div class="logo-area"><img src="../photos/logo-latem.png" alt="Logo" onerror="this.style.display='none'"></div>
        <a href="#" class="nav-item active"><div class="nav-icon"><i class="fa-solid fa-tags"></i></div><span class="nav-text">Identificação</span></a>
        <div style="margin-top:auto;width:100%;margin-bottom:20px">
            <a href="#" class="nav-item" onclick="logout(); return false;">
                <div class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></div><span class="nav-text">Sair</span>
            </a>
        </div>
    </nav>
    
    <main class="main-content">
        <header>
            <div class="header-left">
                <div class="status-badge manual" style="display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:20px;font-size:0.85rem;font-weight:600;background:#fef08a;color:#ca8a04;cursor:default;border:1px solid transparent">
                    <div class="status-dot" style="width:8px;height:8px;border-radius:50%;background:currentColor;"></div>
                    <span>Modo Manual</span>
                </div>
            </div>
            <div class="header-center">
                <i class="fa-regular fa-clock" style="color:var(--primary)"></i>
                <div class="clock-display" id="clock">00:00:00</div>
                <div style="font-size:0.9rem;color:var(--secondary);font-weight:600;" id="date">01/01/2024</div>
            </div>
            <div class="user-info">
                <span id="userNameDisplay">---</span>
                <div class="user-avatar" id="userAvatarIcon"><i class="fa-solid fa-user"></i></div>
            </div>
        </header>
        
        <div class="card form-section">
            <div class="card-title"><span><i class="fa-solid fa-industry"></i> Dados da Produção</span></div>
            <div class="input-group">
                <label>Liga</label>
                <input type="text" id="liga" placeholder="Selecione a Liga">
            </div>
            <div class="input-group"><label>Lote + Fornada *</label><input type="text" id="loteFornada" placeholder="Ex: 000.0+000"></div>
            <div class="input-group"><label>Tipo de Produto</label>
                <select id="tipo" disabled>
                    <option value="Lingote">Lingote</option>
                    <option value="Tarugo">Tarugo</option>
                </select>
            </div>
            <div id="camposTarugo" class="hidden">
                <div class="input-group">
                    <label>Forno Homogenização</label>
                    <input type="text" id="forno" placeholder="Selecione o Forno">
                </div>
                <div class="input-group">
                    <label>Polegada</label>
                    <input type="text" id="polegada" placeholder="Selecione a Polegada" oninput="calcularPesos()">
                </div>
                <div class="input-group">
                    <label>Comprimento (m)</label>
                    <input type="number" step="0.01" id="comprimento" placeholder="0.00" oninput="calcularPesos()">
                </div>
            </div>
            <div style="margin-top:auto;padding-top:10px;text-align:center">
                <button class="btn btn-secondary" onclick="limparTudo()" style="width:100%"><i class="fa-solid fa-eraser"></i> Limpar Tudo</button>
            </div>
        </div>
        
        <div class="scale-section">
            <div class="display-container">
                <div class="display-label">PESO LÍQUIDO (kg)</div>
                <div class="weight-value" id="displayLiquido">0</div>
                <div class="unit">KG</div>
            </div>
            <div class="weight-controls">
                <div class="weight-input-card qtd-card">
                    <label>Quantidade</label>
                    <input type="number" id="quantidade" value="0">
                </div>
                <div class="weight-input-card">
                    <label>Peso Bruto (kg)</label>
                    <input type="number" id="pesoBruto" oninput="calcularPesos()">
                </div>
                <div class="weight-input-card" style="border-left:4px solid var(--primary);">
                    <label>Tara (kg)</label>
                    <input type="number" id="pesoTara" placeholder="0" oninput="calcularPesos()">
                </div>
                <div class="weight-input-card highlight">
                    <label>Peso Líquido (kg)</label>
                    <input type="number" id="pesoLiquido" value="0" readonly>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" onclick="realizarIdentificacao()"><i class="fa-solid fa-tag"></i> Identificar</button>
                <button class="btn btn-warning" onclick="gerarRelatorio()"><i class="fa-solid fa-print"></i> Relatório</button>
            </div>
            <div class="history-section">
                <div class="card-title" style="margin-bottom:10px; display:flex; justify-content:space-between;">
                    <span><i class="fa-solid fa-list-check"></i> Registros</span>
                </div>
                <div class="table-container">
                    <table id="historyTable">
                        <thead><tr><th style="text-align:center;width:10%">Nº</th><th style="text-align:center;width:15%">Quantidade</th><th style="text-align:right;width:20%">Peso Líquido</th><th style="text-align:right;width:20%">Tara</th><th style="text-align:right;width:20%">Peso Bruto</th><th style="text-align:center;width:15%">Ações</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/app.js"></script>

    <script>
        function saveFormState() {
            const state = {
                liga: document.getElementById('liga').value,
                loteFornada: document.getElementById('loteFornada').value,
                tipo: document.getElementById('tipo').value,
                forno: document.getElementById('forno').value,
                polegada: document.getElementById('polegada').value,
                comprimento: document.getElementById('comprimento').value,
                pesoBruto: document.getElementById('pesoBruto').value,
                pesoTara: document.getElementById('pesoTara').value,
                quantidade: document.getElementById('quantidade').value
            };
            localStorage.setItem('latem_id_tl_state', JSON.stringify(state));
        }

        function loadFormState() {
            const state = JSON.parse(localStorage.getItem('latem_id_tl_state'));
            if(state) {
                ['liga','loteFornada','forno','polegada','comprimento','pesoBruto','pesoTara','quantidade'].forEach(id => {
                    if(document.getElementById(id)) document.getElementById(id).value = state[id] || '';
                });
                document.getElementById('tipo').value = state.tipo || 'Lingote';
                toggleCamposTarugo();
            }
        }
        document.querySelector('.form-section').addEventListener('input', saveFormState);
        document.querySelector('.weight-controls').addEventListener('input', saveFormState);

        let currentUser = 'Operador';
        function carregarOperador() { currentUser = localStorage.getItem('latem_user') || 'Operador'; document.getElementById('userNameDisplay').innerText = currentUser; document.getElementById('userAvatarIcon').innerText = currentUser.charAt(0).toUpperCase(); }
        
        function logout() { showToast("Voltando ao menu principal...","info"); setTimeout(() => { window.location.href = '../index.html' }, 1000); }

        document.getElementById('liga').addEventListener('input', (e) => { 
            const val = e.target.value.toUpperCase(); const tipoSelect = document.getElementById('tipo'); 
            if(val.startsWith('AA') || val === 'LIGA T' || val.includes('TARUGO')) { tipoSelect.value = 'Tarugo'; }
            else if(val.startsWith('SAE') || val === 'INDUSTRIAL' || val.includes('LINGOTE')) { tipoSelect.value = 'Lingote'; } 
            toggleCamposTarugo(); 
            saveFormState();
        });
        
        function toggleCamposTarugo() { 
            const isTarugo = document.getElementById('tipo').value === 'Tarugo'; 
            document.getElementById('camposTarugo').classList.toggle('hidden', !isTarugo); 
            const q = document.getElementById('quantidade'); 
            if(isTarugo) { q.value = ''; q.readOnly = true; } else { q.readOnly = false; } 
            calcularPesos(); 
        }
        
        function calcularPesos() { 
            const b = parseFloat(document.getElementById('pesoBruto').value) || 0, t = parseFloat(document.getElementById('pesoTara').value) || 0, l = Math.max(0, b - t); 
            document.getElementById('pesoLiquido').value = l > 0 ? l.toFixed(1) : ''; 
            const d = document.getElementById('displayLiquido'); d.innerText = l > 0 ? l.toFixed(1) : '0'; d.style.color = l < 0 ? 'var(--danger)' : ''; 
            
            const isTarugo = document.getElementById('tipo').value === 'Tarugo'; 
            const q = document.getElementById('quantidade'); 
            if(isTarugo) {
                const pol = parseFloat(document.getElementById('polegada').value) || 0, comp = parseFloat(document.getElementById('comprimento').value) || 0; 
                if(l > 0 && pol > 0 && comp > 0) {
                    const raio = (pol * 0.0254) / 2, volume = Math.PI * Math.pow(raio, 2) * comp, pesoPeca = volume * 2700; 
                    q.value = Math.max(1, Math.round(l / pesoPeca)); q.readOnly = true;
                } else { q.value = ''; }
            } else { q.readOnly = false; } 
        }

        function getDb() { return JSON.parse(localStorage.getItem('latem_prod_id_db')) || []; } 
        function saveDb(db) { localStorage.setItem('latem_prod_id_db', JSON.stringify(db)); renderHistory(); }
        
        function lockFields() {
            const t = document.getElementById('tipo').value; 
            ['liga','loteFornada'].forEach(id => document.getElementById(id).disabled = true); 
            if(t === 'Tarugo') { ['forno','polegada','comprimento'].forEach(id => document.getElementById(id).disabled = true); }
        }
        function unlockFields() { ['liga','loteFornada','forno','polegada','comprimento'].forEach(id => document.getElementById(id).disabled = false); }

        function realizarIdentificacao() { 
            const lote = document.getElementById('loteFornada').value, liga = document.getElementById('liga').value, tipo = document.getElementById('tipo').value, qtd = parseInt(document.getElementById('quantidade').value) || 0, b = parseFloat(document.getElementById('pesoBruto').value) || 0, ta = parseFloat(document.getElementById('pesoTara').value) || 0, l = parseFloat(document.getElementById('pesoLiquido').value) || 0; 
            
            if(!lote || !liga || b <= 0 || qtd <= 0) return showToast("Preencha campos obrigatórios e verifique a quantidade/peso.", "warning"); 
            if(tipo === 'Tarugo') {
                if(!document.getElementById('forno').value || !document.getElementById('polegada').value || !document.getElementById('comprimento').value) return showToast("Para Tarugo, preencha Forno, Polegada e Comprimento.", "warning");
            }
            
            const i = {
                id: Date.now(), data: new Date().toLocaleDateString('pt-BR'), hora: new Date().toLocaleTimeString('pt-BR'),
                lote, liga, tipo, qtd, bruto: b, tara: ta, liq: l, 
                forno: tipo === 'Tarugo' ? document.getElementById('forno').value : '', 
                polegada: tipo === 'Tarugo' ? document.getElementById('polegada').value : '', 
                comprimento: tipo === 'Tarugo' ? document.getElementById('comprimento').value : '', 
                responsavel: currentUser
            }; 
            
            const db = getDb(); db.unshift(i); saveDb(db); 
            lockFields(); 
            showToast("Identificação registrada com sucesso!", "success"); 
            gerarEtiqueta(i); 
            
            document.getElementById('pesoBruto').value = ''; 
            document.getElementById('pesoTara').value = ''; 
            document.getElementById('quantidade').value = tipo === 'Lingote' ? '0' : ''; 
            calcularPesos(); 
            saveFormState();
        }

        let itemParaRemover = null; 
        function pedirRemocao(id) { itemParaRemover = id; document.getElementById('confirmModal').classList.remove('hidden'); } 
        function fecharConfirmacao() { itemParaRemover = null; document.getElementById('confirmModal').classList.add('hidden'); } 
        function confirmarExclusao() { 
            if(itemParaRemover !== null) { let d = getDb().filter(i => i.id !== itemParaRemover); saveDb(d); if(d.length === 0) unlockFields(); showToast("Registo removido.", "info"); itemParaRemover = null; } 
            document.getElementById('confirmModal').classList.add('hidden'); 
        }
        
        function renderHistory() {
            const b = document.querySelector('#historyTable tbody'); b.innerHTML = ''; const d = getDb();
            d.slice(0, 15).forEach((i, x) => {
                b.innerHTML += `<tr><td style="text-align:center">${d.length-x}</td><td style="text-align:center;font-weight:bold">${i.qtd}</td><td style="text-align:right;font-weight:bold;color:var(--primary)">${i.liq} kg</td><td style="text-align:right">${i.tara} kg</td><td style="text-align:right">${i.bruto} kg</td><td style="text-align:center"><button class="btn-danger" style="padding:5px 8px;height:auto" onclick="pedirRemocao(${i.id})"><i class="fa-solid fa-trash"></i></button></td></tr>`;
            });
        }
        
        function limparTudo() {
            const a = getDb().length > 0;
            const b = document.getElementById('pesoBruto').value;
            const t = document.getElementById('pesoTara').value;
            const q = document.getElementById('quantidade').value;
            const lf = document.getElementById('loteFornada').value;
            const lg = document.getElementById('liga').value;
            const fo = document.getElementById('forno').value;
            const pol = document.getElementById('polegada').value;
            const comp = document.getElementById('comprimento').value;

            if (a) {
                if (!t && (!q || q==='0' || q==='') && (!b || b==='0')) return showToast("Os campos parciais já estão vazios.", "warning");
                document.getElementById('pesoTara').value = '';
                document.getElementById('quantidade').value = document.getElementById('tipo').value === 'Lingote' ? '0' : '';
                document.getElementById('pesoBruto').value = '';
                calcularPesos();
                showToast("Campos parciais limpos com sucesso.", "success");
            } else {
                if (!lf && !lg && !fo && !pol && !comp && !t && (!q || q==='0' || q==='') && (!b || b==='0')) return showToast("O formulário já está vazio.", "warning");
                unlockFields();
                ['loteFornada', 'liga', 'forno', 'polegada', 'comprimento', 'pesoTara', 'pesoBruto'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
                document.getElementById('tipo').value = 'Lingote';
                document.getElementById('quantidade').value = '0';
                toggleCamposTarugo();
                showToast("Todos os campos limpos com sucesso.", "success");
            }
            saveFormState();
        }

        function gerarEtiqueta(i) { 
            document.getElementById('etiquetaArea').innerHTML = `
                <div style="padding:8px; height:100%; display:flex; flex-direction:column; justify-content:space-between; box-sizing:border-box;">
                    <div style="text-align:center;border-bottom:2px solid black;padding-bottom:3px;margin-bottom:3px">
                        <img src="../photos/logo-latem.png" style="max-height:25px;display:block;margin:0 auto 3px auto" onerror="this.style.display='none'">
                        <span style="font-size:11px;font-weight:bold;display:block">COMPROVANTE DE IDENTIFICAÇÃO</span>
                    </div>
                    <div style="font-size:11px;line-height:1.4;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">
                        <div style="text-align:left">
                            <div><strong>Liga:</strong> ${i.liga}</div>
                            <div style="margin-top:1px"><strong>Lote + Fornada *:</strong> ${i.lote}</div>
                            <div style="margin-top:1px"><strong>Tipo:</strong> ${i.tipo.toUpperCase()}</div>
                        </div>
                        <div style="text-align:right">
                            ${i.tipo === 'Tarugo' ? `
                            <div><strong>Forno:</strong> ${i.forno}</div>
                            <div style="margin-top:1px"><strong>Polegada:</strong> ${i.polegada}"</div>
                            <div style="margin-top:1px"><strong>Comprimento:</strong> ${i.comprimento}m</div>` : ''}
                        </div>
                    </div>
                    <div style="text-align:center;border-top:1px dashed black;border-bottom:1px dashed black;padding:3px 0;margin:3px 0;font-size:10px">
                        <div style="display:flex;justify-content:space-between;margin-bottom:2px;">
                            <span>Peso Bruto: ${i.bruto} kg</span>
                            <span>Tara: ${i.tara} kg</span>
                        </div>
                        <div style="font-size:16px;font-weight:bold;margin-top:2px;">Peso Líquido: ${i.liq} kg</div>
                        <div style="font-size:12px;font-weight:bold;margin-top:1px;">Quantidade: ${i.qtd}</div>
                    </div>
                    <div style="margin-top:auto;text-align:center">
                        <div style="font-family:'Libre Barcode 128',cursive;font-size:32px">*${i.lote}*</div>
                    </div>
                    <div style="margin-top:3px;border-top:1px solid black;padding-top:2px;text-align:center;font-size:8px;font-weight:bold;">
                        DATA: ${i.data} | HORA: ${i.hora} | RESPONSÁVEL: ${i.responsavel.toUpperCase()}
                    </div>
                </div>`; 
            document.getElementById('etiquetaModal').style.display = 'flex'; 
        }
        
        function fecharEtiqueta() { document.getElementById('etiquetaModal').style.display = 'none'; } 
        function imprimirEtiqueta() { document.body.classList.add('printing-label'); window.print(); document.body.classList.remove('printing-label'); }

        function gerarRelatorio(){ 
            const db=getDb(); 
            if(!db.length)return showToast("Sem dados para relatório.","warning"); 
            let rw='',tb=0,tt=0,tl=0; const t=db[0].tipo==='Tarugo'; 
            db.slice().reverse().forEach((i,x)=>{
                tb+=parseFloat(i.bruto);tt+=parseFloat(i.tara);tl+=parseFloat(i.liq);
                rw+=`<tr><td style="text-align:center">${x+1}</td><td style="text-align:center">${i.qtd}</td><td style="text-align:right">${i.bruto}</td><td style="text-align:right">${i.tara}</td><td style="text-align:right;font-weight:bold">${i.liq}</td></tr>`;
            }); 
            const horaStr = new Date().toLocaleTimeString('pt-BR').replace(/:/g, '-');
            const qtdTotal = db.reduce((sum, item) => sum + parseInt(item.qtd || 0), 0);
            const filename = `RITL_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}_${horaStr}_${db[0].liga}_${db[0].lote.replace(/[\/\\]/g,'-')}_${qtdTotal}un_${tl.toFixed(2)}kg`;
            const conteudoHTML = `
                <div style="display: flex; justify-content: space-between; border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; background: #f9f9f9; font-size:14px;">
                    <div style="text-align: left;">
                        <div><strong>Liga:</strong> ${db[0].liga}</div>
                        <div style="margin-top:4px"><strong>Lote + Fornada *:</strong> ${db[0].lote}</div>
                        <div style="margin-top:4px"><strong>Tipo:</strong> ${db[0].tipo.toUpperCase()}</div>
                    </div>
                    ${t ? `
                    <div style="text-align: right;">
                        <div><strong>Forno:</strong> ${db[0].forno}</div>
                        <div style="margin-top:4px"><strong>Polegada:</strong> ${db[0].polegada}"</div>
                        <div style="margin-top:4px"><strong>Comprimento:</strong> ${db[0].comprimento}m</div>
                    </div>` : ''}
                </div>
                <div style="display: flex; justify-content: space-around; border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; background: #f9f9f9; font-size:15px; font-weight: bold;">
                    <span>Peso Bruto Total: ${tb.toFixed(2)} kg</span>
                    <span>Tara Total: ${tt.toFixed(2)} kg</span>
                    <span>Peso Líquido Total: ${tl.toFixed(2)} kg</span>
                </div>
                <table>
                    <thead><tr><th style="text-align:center;width:10%">Nº</th><th style="text-align:center;width:15%">Quantidade</th><th style="text-align:right;width:25%">Peso Bruto (kg)</th><th style="text-align:right;width:25%">Tara (kg)</th><th style="text-align:right;width:25%">Peso Líquido (kg)</th></tr></thead>
                    <tbody>${rw}</tbody>
                </table>
            `; 
            baixarArquivoRelatorio("Relatório de Identificação de Tarugos e Lingotes", conteudoHTML, filename, currentUser);
            localStorage.removeItem('latem_prod_id_db'); 
            unlockFields(); 
            renderHistory(); 
            limparTudo(); 
        }

        window.onload = () => { 
            carregarOperador(); 
            setupAutocomplete('liga', CONFIG.ligas);
            setupAutocomplete('forno', CONFIG.fornos);
            setupAutocomplete('polegada', CONFIG.polegadas);
            loadFormState();
            if(getDb().length > 0) {
                const l = getDb()[0];
                document.getElementById('liga').value = l.liga;
                document.getElementById('loteFornada').value = l.lote;
                document.getElementById('tipo').value = l.tipo;
                if(l.tipo === 'Tarugo') {
                    document.getElementById('forno').value = l.forno || '';
                    document.getElementById('polegada').value = l.polegada || '';
                    document.getElementById('comprimento').value = l.comprimento || '';
                }
                toggleCamposTarugo();
                lockFields(); 
                showToast("Atenção: Identificação em andamento.", "info");
            } 
            renderHistory(); 
        };
    </script>
</body>
</html>
